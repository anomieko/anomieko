<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse {
        0%, 30%, 100% { opacity: 0.07; }
        8%, 12% { opacity: 1; }
      }
      @keyframes linePulse {
        0%, 30%, 100% { opacity: 0.025; }
        8%, 12% { opacity: 0.3; }
      }
      @keyframes rebel {
        0%, 40%, 60%, 100% { opacity: 0.07; }
        48%, 52% { opacity: 0.85; }
      }
      @keyframes rebelLine {
        0%, 40%, 60%, 100% { opacity: 0.025; }
        48%, 52% { opacity: 0.25; }
      }
      @keyframes textBreath {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.7; }
      }

      .n { fill: #ffffff; }
      .l { stroke: #ffffff; stroke-width: 0.4; fill: none; }

      .d0 { animation: pulse 9s ease-in-out infinite; animation-delay: 0s; }
      .d1 { animation: pulse 9s ease-in-out infinite; animation-delay: 0.45s; }
      .d2 { animation: pulse 9s ease-in-out infinite; animation-delay: 0.9s; }
      .d3 { animation: pulse 9s ease-in-out infinite; animation-delay: 1.35s; }
      .d4 { animation: pulse 9s ease-in-out infinite; animation-delay: 1.8s; }
      .d5 { animation: pulse 9s ease-in-out infinite; animation-delay: 2.25s; }

      .ld0 { animation: linePulse 9s ease-in-out infinite; animation-delay: 0.2s; }
      .ld1 { animation: linePulse 9s ease-in-out infinite; animation-delay: 0.65s; }
      .ld2 { animation: linePulse 9s ease-in-out infinite; animation-delay: 1.1s; }
      .ld3 { animation: linePulse 9s ease-in-out infinite; animation-delay: 1.55s; }
      .ld4 { animation: linePulse 9s ease-in-out infinite; animation-delay: 2.0s; }

      .rebel { animation: rebel 4.5s ease-in-out infinite; }
      .rebelL { animation: rebelLine 4.5s ease-in-out infinite; }

      .title {
        font-family: 'Helvetica Neue', 'Arial', sans-serif;
        font-weight: 200;
        font-size: 38px;
        letter-spacing: 22px;
        fill: #ffffff;
        opacity: 0.55;
        animation: textBreath 9s ease-in-out infinite;
      }
    </style>
  </defs>

