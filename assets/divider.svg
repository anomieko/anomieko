<svg width="400" height="20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes d1 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-2px) translateX(1px); } }
      @keyframes d2 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(1.5px) translateX(-1.5px); } }
      @keyframes d3 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-1px) translateX(2px); } }
      @keyframes d4 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(1.8px) translateX(-0.5px); } }
      @keyframes d5 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-1.2px) translateX(-1px); } }
      @keyframes d6 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(0.8px) translateX(1.5px); } }
      @keyframes d7 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-1.5px) translateX(-2px); } }
      @keyframes d8 { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(1px) translateX(0.8px); } }

      .s { stroke: #ffffff; stroke-width: 0.4; fill: none; opacity: 0.2; }

      .g1 { animation: d1 38s ease-in-out infinite; }
      .g2 { animation: d2 44s ease-in-out infinite; }
      .g3 { animation: d3 31s ease-in-out infinite; }
      .g4 { animation: d4 52s ease-in-out infinite; }
      .g5 { animation: d5 41s ease-in-out infinite; }
      .g6 { animation: d6 47s ease-in-out infinite; }
      .g7 { animation: d7 35s ease-in-out infinite; }
      .g8 { animation: d8 56s ease-in-out infinite; }

      @media (prefers-color-scheme: light) {
        .s { stroke: #000000; }
      }
    </style>
  </defs>

  <g class="g1"><line class="s" x1="100" y1="10" x2="135" y2="10"/></g>
  <g class="g2"><line class="s" x1="138" y1="10" x2="165" y2="10"/></g>
  <g class="g3"><line class="s" x1="168" y1="10" x2="198" y2="10"/></g>
  <g class="g4"><line class="s" x1="201" y1="10" x2="225" y2="10"/></g>
  <g class="g5"><line class="s" x1="228" y1="10" x2="258" y2="10"/></g>
  <g class="g6"><line class="s" x1="261" y1="10" x2="285" y2="10"/></g>
  <g class="g7"><line class="s" x1="288" y1="10" x2="318" y2="10"/></g>
  <g class="g8"><line class="s" x1="321" y1="10" x2="350" y2="10"/></g>
</svg>
